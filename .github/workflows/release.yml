name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  macos-sign:
    needs: release
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release archive
        run: |
          curl -sL -o usectl.tar.gz \
            "https://github.com/syst3mctl/usectl-cli/releases/download/v${{ steps.version.outputs.VERSION }}/usectl_${{ steps.version.outputs.VERSION }}_darwin_${{ matrix.arch }}.tar.gz"
          tar xzf usectl.tar.gz

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm certificate.p12

      - name: Sign binary
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        run: |
          codesign --sign "$APPLE_IDENTITY" \
            --options runtime \
            --timestamp \
            --force \
            usectl

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Zip for notarization (notarytool requires zip/dmg/pkg)
          zip usectl-notarize.zip usectl

          xcrun notarytool submit usectl-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 10m

          rm usectl-notarize.zip

      - name: Re-package signed archive
        run: |
          ARCHIVE="usectl_${{ steps.version.outputs.VERSION }}_darwin_${{ matrix.arch }}.tar.gz"
          tar czf "$ARCHIVE" usectl README.md
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload signed archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.version.outputs.VERSION }}" \
            "${{ env.ARCHIVE }}" --clobber

  aur-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -sL "https://github.com/syst3mctl/usectl-cli/releases/download/v${{ steps.version.outputs.VERSION }}/checksums.txt" -o checksums.txt
          echo "AMD64_SHA=$(grep linux_amd64 checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "ARM64_SHA=$(grep linux_arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_ENV

      - name: Generate PKGBUILD
        run: |
          cat > PKGBUILD << 'HEREDOC'
          # Maintainer: syst3mctl <support@usectl.com>
          pkgname=usectl
          pkgver=${{ steps.version.outputs.VERSION }}
          pkgrel=1
          pkgdesc="CLI for the usectl self-hosted deployment platform"
          arch=('x86_64' 'aarch64')
          url="https://github.com/syst3mctl/usectl-cli"
          license=('MIT')
          depends=('glibc')
          source_x86_64=("${url}/releases/download/v${pkgver}/usectl_${pkgver}_linux_amd64.tar.gz")
          source_aarch64=("${url}/releases/download/v${pkgver}/usectl_${pkgver}_linux_arm64.tar.gz")
          sha256sums_x86_64=('${{ env.AMD64_SHA }}')
          sha256sums_aarch64=('${{ env.ARM64_SHA }}')
          package() {
            install -Dm755 usectl "$pkgdir/usr/bin/usectl"
          }
          HEREDOC
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' PKGBUILD
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: usectl
          pkgbuild: ./PKGBUILD
          commit_username: syst3mctl
          commit_email: support@usectl.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.VERSION }}"


